name: Nouvelle Feature
description: Processus complet pour implémenter une nouvelle fonctionnalité

steps:
  - step: 1
    agent: pm
    action: Rédiger la spec (user stories, critères d'acceptation, priorité)
    output: Spec validée
    depends_on: []

  - step: 2
    agent: architect
    action: Définir l'architecture (modèles, routes, composants, services)
    output: Plan technique
    depends_on: []
    # Parallélisable avec step 1

  - step: 3
    agent: database
    action: Concevoir le schéma, écrire les migrations, ajouter les index
    output: Migrations + schéma
    depends_on: [2]

  - step: 4
    agent: backend
    action: Implémenter les modèles, controllers, services
    output: Code backend
    depends_on: [3]

  - step: 5
    agent: frontend
    action: Créer les pages et composants React
    output: Code frontend
    depends_on: [4]

  - step: 6
    agent: testing
    action: Écrire les tests unitaires et d'intégration
    output: Tests complets
    depends_on: [4, 5]

  - step: 7
    agent: security
    action: Auditer le code produit (vulnérabilités, bonnes pratiques)
    output: Rapport de sécurité + corrections
    depends_on: [4, 5]
    # Parallélisable avec step 6
