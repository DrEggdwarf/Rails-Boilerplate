name: Code Review Multi-Agents
description: Review de code par chaque agent selon son périmètre
mode: parallel

# Agents "core" — lancés à chaque review
core:
  - agent: architect
    action: Vérifier la cohérence structurelle et le respect des patterns
    checklist:
      - Le code est au bon endroit dans l'arborescence
      - Les dépendances sont justifiées
      - Les conventions de nommage sont respectées
      - Pas de couplage fort entre les couches

  - agent: security
    action: Auditer les vulnérabilités statiques (lecture de code)
    checklist:
      - Pas d'injection possible (SQL, XSS)
      - Strong parameters utilisés
      - Pas de secrets en dur
      - Entrées utilisateur validées
      - CSRF protection en place

  - agent: quality
    action: Vérifier la maintenabilité et la qualité du code
    checklist:
      - Aucun fichier > 200 lignes sans justification
      - Aucune fonction > 30 lignes sans justification
      - Conventions de nommage respectées (snake_case RB, camelCase JS, PascalCase composants)
      - Pas de code dupliqué
      - Pas de magic numbers ou strings hardcodées

  - agent: testing
    action: Vérifier la couverture de tests
    checklist:
      - Tests unitaires pour les modèles
      - Tests d'intégration pour les controllers
      - Cas limites couverts
      - Tests indépendants et lisibles

# Agents "backend" — lancés si des fichiers backend ont changé
backend:
  - agent: backend
    action: Vérifier la logique métier et la qualité Rails
    checklist:
      - Code idiomatique Rails
      - Pas de N+1 queries
      - Validations en place
      - Callbacks justifiés
      - Clés i18n créées dans fr.yml ET en.yml

  - agent: database
    action: Vérifier les migrations et la performance SQL
    checklist:
      - Index sur les clés étrangères
      - Migrations réversibles
      - Pas de requêtes lentes évidentes
      - Contraintes d'intégrité en place

  - agent: performance
    action: Vérifier les performances backend (N+1, caching, temps de réponse)
    checklist:
      - Pas de N+1 détectables
      - Caching utilisé là où pertinent
      - Props Inertia non surchargées (pas de tableaux > 100 items sans pagination)

# Agents "frontend" — lancés si des fichiers frontend ont changé
frontend:
  - agent: frontend
    action: Vérifier l'UI, les conventions React et l'i18n
    checklist:
      - Pas de logique métier côté client
      - Props correctement utilisées
      - useTranslation() utilisé — aucun texte hardcodé
      - Composants dans le bon dossier (pages/ vs components/)

  - agent: a11y
    action: Auditer l'accessibilité WCAG 2.1 AA
    checklist:
      - Contraste >= 4.5:1 sur tous les textes
      - Attributs ARIA présents et corrects
      - Navigation clavier fonctionnelle
      - Images avec alt appropriés
      - Formulaires avec labels associés
      - Hiérarchie des headings logique

  - agent: performance
    action: Vérifier les performances frontend (bundle, lazy loading, assets)
    checklist:
      - Pas d'import lourd non nécessaire au premier rendu
      - Lazy loading pour les composants non critiques
      - Images optimisées

# Agents "on-demand" — lancés uniquement sur demande explicite
on_demand:
  - agent: pentester
    trigger: "après ajout d'une nouvelle route, d'un formulaire, ou d'une feature d'auth"
    action: Exécuter des tests d'intrusion sur localhost
    checklist:
      - Injection SQL testée sur les paramètres exposés
      - XSS réfléchi testé sur les champs affichés
      - CSRF token validé sur toutes les mutations
      - Headers de sécurité HTTP présents
      - Accès sans authentification bloqué sur les routes protégées
